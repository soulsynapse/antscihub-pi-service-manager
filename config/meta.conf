# /opt/antscihub-pi-service-manager/config/meta.conf

# Where to scan for managed service folders
SERVICES_DIR=""  # Set during install to ~user/Desktop

# How often to check that services are running (seconds)
CHECK_INTERVAL=30

# How many consecutive failures before restarting a service
RESTART_THRESHOLD=3

# How many consecutive restart failures before giving up and just reporting
MAX_RESTART_ATTEMPTS=5

# Pull repos on boot? (true/false)
PULL_ON_BOOT=true

# Git-backed source repo used for self-update pulls.
# Set during install when blank.
SELF_REPO_DIR=""

# MQTT topic prefix
MQTT_TOPIC_PREFIX="fleet/managed-services"